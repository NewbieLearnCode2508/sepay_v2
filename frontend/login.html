<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>Đăng nhập - 2S Store</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="common.css" />
  </head>
  <body>
    <div class="container">
      <div id="loginForm" class="auth-form">
        <h2><i class="fas fa-sign-in-alt"></i> Đăng nhập</h2>
        <input
          type="text"
          id="loginUsername"
          class="auth-input"
          placeholder="Tên đăng nhập"
        />
        <input
          type="password"
          id="loginPassword"
          class="auth-input"
          placeholder="Mật khẩu"
        />
        <button id="doLoginBtn" class="auth-btn">Đăng nhập</button>
        <div class="auth-switch" id="showRegisterBtn">
          Chưa có tài khoản? Đăng ký
        </div>
      </div>
      <div id="registerForm" class="auth-form hidden">
        <h2><i class="fas fa-user-plus"></i> Đăng ký</h2>
        <input
          type="text"
          id="regUsername"
          class="auth-input"
          placeholder="Tên đăng nhập"
        />
        <input
          type="password"
          id="regPassword"
          class="auth-input"
          placeholder="Mật khẩu"
        />
        <button id="doRegisterBtn" class="auth-btn">Đăng ký</button>
        <div class="auth-switch" id="showLoginBtn">
          Đã có tài khoản? Đăng nhập
        </div>
      </div>
    </div>
    <script src="common.js"></script>
    <script src="login.js"></script>
  </body>
</html>
